<html>
<head>
  <title>JavaScript Demo</title>
  <script>
    function calcSum() {
      var value1 = parseInt(document.mainForm.textBox1.value);
      var value2 = parseInt(document.mainForm.textBox2.value);
      var sum = value1 + value2;
      document.mainForm.textBoxSum.value = sum;
    }
  </script>
</head>
<body>
<form name="mainForm">
  <input type="text" name="textBox1"><br><br>
  <input type="text" name="textBox2"><br><br>
  <input type="button" value="Click Me" onclick="calcSum()"><br><br>
  <input type="text" name="textBoxSum" readonly>
</form>
</body>
</html>
